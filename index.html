<script>
// read progress
var rpFill=document.getElementById('rpFill'),rpPct=document.getElementById('rpPct');
function updateProgress(){
  var sh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
  if(rpFill)rpFill.style.width=pct+'%';
  if(rpPct)rpPct.textContent=Math.round(pct)+'%';
  var bt=document.getElementById('backTop');
  if(bt)bt.classList.toggle('show',window.scrollY>600);
}
window.addEventListener('scroll',updateProgress,{passive:true});updateProgress();
// hide capsule near end
(function(){var cap=document.getElementById('readProgress');if(!cap)return;
  function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
  var t=document.querySelector('[data-wy-notice="v2"]')||document.querySelector('.site-footer');if(!t)return;
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(es){setHide(es.some(function(e){return e.isIntersecting;}));},
      {root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});io.observe(t);
  }else{window.addEventListener('scroll',function(){
    setHide(document.documentElement.scrollHeight-(window.scrollY+window.innerHeight)<240);},{passive:true});}
})();
// sidebar
var sbBrand=document.getElementById('sbBrand');
if(sbBrand)sbBrand.addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});
var sbToggle=document.getElementById('sbToggle'),sb=document.getElementById('sb');
if(sbToggle)sbToggle.addEventListener('click',function(){sb.classList.toggle('open');});
var backTop=document.getElementById('backTop');
if(backTop)backTop.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
// highlight
var chapters=[].slice.call(document.querySelectorAll('section.chapter'));
var sbItems=[].slice.call(document.querySelectorAll('.sb-item'));
function highlight(){
  var idx=-1;
  for(var i=0;i<chapters.length;i++){
    if(chapters[i].getBoundingClientRect().top<window.innerHeight*0.35) idx=i;
  }
  sbItems.forEach(function(it,i){it.classList.toggle('active',i===idx);});
}
window.addEventListener('scroll',highlight,{passive:true});highlight();
// iframe auto height (viewport/content decoupled)
function resizeFrame(f){
  try{var d=f.contentDocument||f.contentWindow.document;if(!d||!d.body)return;
    d.body.style.minHeight='0';d.body.style.height='auto';
    if(d.documentElement){d.documentElement.style.minHeight='0';d.documentElement.style.height='auto';}
    var h=d.body.scrollHeight;
    if(h>100){f.style.height=h+'px';f.style.minHeight='0';}
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function')updateProgress();
}
function setupFrame(f){var tries=0;
  function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
  if(f.contentDocument&&f.contentDocument.readyState==='complete')tick();
  else f.addEventListener('load',tick);}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});
// anchor click safe-scroll
document.addEventListener('click',function(e){
  var a=e.target;while(a&&a.tagName!=='A')a=a.parentElement;if(!a)return;
  var h=a.getAttribute('href');if(!h||h.charAt(0)!=='#'||h.length<2)return;
  var id=h.substring(1);var el=document.getElementById(id);if(!el)return;
  e.preventDefault();resizeAllFrames();
  setTimeout(function(){resizeAllFrames();var rect=el.getBoundingClientRect();
    window.scrollTo({top:window.scrollY+rect.top-20,behavior:'smooth'});},60);
},true);
var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);},300);
// outer anti-copy
(function(){var blk=function(e){e.preventDefault();return false;};
['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){document.addEventListener(ev,blk,true);});
document.addEventListener('keydown',function(e){var k=e.key;
  if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X'))blk(e);
  if(k==='F12')blk(e);
  if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K'))blk(e);
},true);})();
</script>
<script id="wy-section-router">
(function(){
  function go(){
    var h=location.hash||"";
    var m=h.match(/^#chapter-(\d+)-(\d+)-(\d+)$/);
    if(!m) return;
    var P=m[1], target=h.substring(1);
    var sec=document.getElementById("chapter-"+P);
    if(!sec) return;
    var tries=0;
    (function poll(){
      tries++;
      var ifr=sec.querySelector("iframe.ch-frame");
      var el=null;
      try{ var d=ifr&&ifr.contentDocument; if(d) el=d.getElementById(target); }catch(e){}
      if(el){
        try{
          var inRect=el.getBoundingClientRect();
          var frRect=ifr.getBoundingClientRect();
          window.scrollTo({top:window.scrollY+frRect.top+inRect.top-20, behavior:"smooth"});
        }catch(e){}
        return;
      }
      if(tries<80) setTimeout(poll,150);
    })();
  }
  (window.__wyReady||Promise.resolve()).then(function(){ setTimeout(go,400); });
  window.addEventListener("hashchange", go);
})();
</script>
<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-46-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
